<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #16324F;
            --blue: #2A5C8A;
            --blue-light: #EAF1F8;
            --bg: #F4F6F9;
            --card: #FFFFFF;
            --border: #E2E8F0;
            --text: #1F2937;
            --muted: #64748B;
            --shadow: 0 1px 3px rgba(16, 32, 55, 0.05), 0 10px 30px rgba(16, 32, 55, 0.04);
            --radius: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            color: #fff;
            padding: 22px 28px;
            box-shadow: 0 2px 12px rgba(16, 32, 55, 0.18);
        }

        .topbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .topbar-inner h1 {
            font-family: 'Sora', sans-serif;
            font-size: 22px;
            margin: 0;
            font-weight: 700;
        }

        .topbar-inner p {
            margin: 4px 0 0;
            font-size: 13px;
            color: #CFE0F2;
            font-weight: 500;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.28);
            color: #fff;
            padding: 9px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 600;
            font-family: inherit;
            transition: var(--transition);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateX(-2px);
        }

        .toolbar {
            max-width: 1200px;
            margin: 28px auto 0;
            padding: 0 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .crawl-status-bar {
            max-width: 1200px;
            margin: 12px auto 0;
            padding: 0 28px;
            display: none;
        }

        .crawl-status-inner {
            background: #FFF8E1;
            border: 1px solid #FFD54F;
            border-radius: 9px;
            padding: 10px 16px;
            font-size: 13px;
            color: #5D4037;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .crawl-spinner {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #FFD54F;
            border-top-color: #F57F17;
            animation: spin .7s linear infinite;
            flex-shrink: 0;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            opacity: .45;
            color: var(--muted);
        }

        #searchInput {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 14.5px;
            font-family: inherit;
            box-shadow: var(--shadow);
            outline: none;
            transition: var(--transition);
        }

        #searchInput:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(42, 92, 138, 0.15);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 28px 80px;
        }

        .status-banner {
            border-radius: 9px;
            padding: 12px 16px;
            font-size: 13.5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: var(--red-bg);
            border: 1px solid #F3B4B4;
            color: var(--red);
        }

        /* Loading / Spinner State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 4px solid var(--blue-light);
            border-top-color: var(--blue);
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-state p {
            color: var(--muted);
            font-size: 14.5px;
            font-weight: 500;
            margin: 0;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            color: var(--muted);
        }

        .empty-state svg {
            color: var(--border);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-family: 'Sora', sans-serif;
            font-size: 17px;
            margin: 0 0 6px;
            color: var(--navy);
        }

        .empty-state p {
            font-size: 14px;
            margin: 0;
        }

        /* Collapsible Accordion Styles */
        .accordion-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
        }

        .accordion-item:hover {
            box-shadow: 0 4px 20px rgba(16, 32, 55, 0.08);
        }

        .accordion-header {
            width: 100%;
            background: none;
            border: none;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            text-align: left;
            outline: none;
            transition: var(--transition);
        }

        .accordion-header:hover {
            background-color: var(--blue-light);
        }

        .accordion-title {
            font-family: 'Sora', sans-serif;
            font-size: 16.5px;
            font-weight: 700;
            color: var(--navy);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .count-badge {
            background: var(--blue);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            min-width: 24px;
            text-align: center;
        }

        .chevron {
            font-size: 12px;
            color: var(--muted);
            transition: transform 0.25s ease;
        }

        .accordion-item.expanded .chevron {
            transform: rotate(180deg);
        }

        .accordion-content {
            display: none;
            border-top: 1px solid var(--border);
            background-color: #FAFBFD;
        }

        .accordion-item.expanded .accordion-content {
            display: block;
        }

        /* Report Table / List Styles */
        .table-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
        }

        .report-table th {
            text-align: left;
            background-color: #ECEFF3;
            color: var(--navy);
            font-size: 11.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 18px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        .report-row {
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }

        .report-row:last-child {
            border-bottom: none;
        }

        .report-row:hover {
            background-color: #F8FAFC;
        }

        .report-row td {
            padding: 12px 16px;
            font-size: 13.5px;
            vertical-align: top;
            max-width: 280px;
        }

        .report-name-cell {
            font-weight: 600;
            color: var(--navy);
            min-width: 160px;
        }

        .report-id-cell {
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 12px;
            color: var(--muted);
            min-width: 80px;
        }

        /* Pills & Badges System */
        .pills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }

        .pill-tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11.5px;
            font-weight: 500;
            line-height: 1.3;
            white-space: normal;
            word-break: break-word;
            border: 1px solid transparent;
        }

        .pill-dim {
            background-color: #EFF6FF;
            color: #1D4ED8;
            border-color: #BFDBFE;
        }

        .pill-measure {
            background-color: #ECFDF5;
            color: #047857;
            border-color: #A7F3D0;
        }

        .pill-var {
            background-color: #F5F3FF;
            color: #6D28D9;
            border-color: #DDD6FE;
        }

        .pill-filter {
            background-color: #FFFBEB;
            color: #B45309;
            border-color: #FDE68A;
        }

        .pill-more {
            background-color: #F3F4F6;
            color: #4B5563;
            border-color: #E5E7EB;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .pill-more:hover {
            background-color: #E5E7EB;
            color: #1F2937;
        }

        .formula-block {
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 11.5px;
            background: #F8FAFC;
            color: #0F172A;
            border: 1px solid #E2E8F0;
            border-left: 3px solid #2A5C8A;
            padding: 5px 8px;
            border-radius: 5px;
            word-break: break-all;
            max-height: 90px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .btn-view-details {
            padding: 5px 10px;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--blue);
            background: var(--blue-light);
            border: 1px solid #C9DDEF;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-view-details:hover {
            background: var(--blue);
            color: #ffffff;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: #ffffff;
            border-radius: 14px;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 18px 24px;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            margin: 0;
            font-family: 'Sora', sans-serif;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-section {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 9px;
            padding: 14px 16px;
        }

        .modal-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--navy);
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .action-link {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
        }

        .action-link:hover {
            color: var(--navy);
            text-decoration: underline;
        }

        .load-more-footer {
            padding: 20px 24px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: #FAFBFD;
        }

        .load-more-btn {
            background: linear-gradient(135deg, var(--blue), var(--navy));
            color: #fff;
            border: none;
            padding: 11px 28px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(42, 92, 138, 0.25);
        }

        .load-more-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(42, 92, 138, 0.35);
        }

        .load-more-info {
            font-size: 12.5px;
            color: var(--muted);
            margin-top: 8px;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-inner">
            <div>
                <h1>Reports Inventory</h1>
                <p>All BusinessObjects documents categorized by report type</p>
            </div>
            <button class="back-btn" onclick="history.back()">← Back to Overview</button>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="7" />
                <path d="M21 21l-4.3-4.3" />
            </svg>
            <input type="text" id="searchInput" placeholder="Search by report name or ID…" oninput="handleSearch()">
        </div>
    </div>

    <div class="crawl-status-bar" id="crawlStatusBar">
        <div class="crawl-status-inner">
            <div class="crawl-spinner"></div>
            <span id="crawlStatusText">WebI crawl is running — fetching dimensions &amp; measures…</span>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading reports...</p>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this) closeDetailModal()">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalReportTitle">Report Details</h3>
                <button class="modal-close-btn" onclick="closeDetailModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script>
        let reportGroups = {};
        let activeSearch = "";
        let reportsById = {};

        async function init() {
            await loadReports();
        }

        async function loadReports() {
            const container = document.getElementById("mainContainer");
            container.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading report details & metadata...</p>
                </div>
            `;
            try {
                const res = await fetch("/api/reports/list");
                if (!res.ok) {
                    throw new Error(`Server returned ${res.status}`);
                }
                reportGroups = await res.json();
                renderUI();
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="status-banner">
                        <span>Error loading reports: ${err.message}</span>
                        <a href="javascript:void(0)" onclick="loadReports()" style="color: inherit; font-weight: bold; text-decoration: underline;">Retry</a>
                    </div>
                `;
            }
        }

        function toggleGroup(groupId) {
            const item = document.getElementById(`group-${groupId}`);
            if (item) {
                item.classList.toggle("expanded");
            }
        }

        function handleSearch() {
            activeSearch = document.getElementById("searchInput").value.trim().toLowerCase();
            renderUI();
        }

        function cleanHex(str) {
            if (!str) return "";
            return String(str).replace(/_x([0-9a-fA-F]{4})_/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
        }

        function parseList(val) {
            if (!val) return [];
            if (Array.isArray(val)) {
                return val.map(v => cleanHex(v)).filter(Boolean);
            }
            const cleanStr = cleanHex(val);
            return cleanStr.split(/,\s*/).map(s => s.trim()).filter(Boolean);
        }

        function renderPills(data, pillClass, maxVisible = 3) {
            const items = parseList(data);
            if (items.length === 0) return '<span style="color:var(--muted); font-size:12px;">—</span>';

            const visibleItems = items.slice(0, maxVisible);
            const hiddenItems = items.slice(maxVisible);

            let html = `<div class="pills-container">`;
            visibleItems.forEach(item => {
                html += `<span class="pill-tag ${pillClass}">${esc(item)}</span>`;
            });

            if (hiddenItems.length > 0) {
                const uid = 'more-' + Math.random().toString(36).substr(2, 9);
                html += `<span class="pill-tag pill-more" id="${uid}-btn" onclick="toggleMorePills('${uid}')">+${hiddenItems.length} more</span>`;
                html += `<span id="${uid}-extra" style="display:none;" class="pills-container">`;
                hiddenItems.forEach(item => {
                    html += `<span class="pill-tag ${pillClass}">${esc(item)}</span>`;
                });
                html += `</span>`;
            }
            html += `</div>`;
            return html;
        }

        function toggleMorePills(uid) {
            const extra = document.getElementById(uid + '-extra');
            const btn = document.getElementById(uid + '-btn');
            if (extra) {
                extra.style.display = 'inline-flex';
                extra.style.flexWrap = 'wrap';
                extra.style.gap = '4px';
            }
            if (btn) {
                btn.style.display = 'none';
            }
        }

        function openDetailModal(reportId) {
            const r = reportsById[reportId];
            if (!r) return;

            const modal = document.getElementById("detailModal");
            const rName = cleanHex(r.name || r.Name || r["Report Name"] || "Unnamed Report");
            document.getElementById("modalReportTitle").textContent = `${rName} (ID ${r.id || r.ID || "—"})`;

            const dims = r.dimensions || r.Dimensions || [];
            const measures = r.measures || r.Measures || [];

            const body = document.getElementById("modalBody");
            body.innerHTML = `
                <div class="modal-section">
                    <div class="modal-section-title">Dimensions (${dims.length})</div>
                    ${renderPills(dims, "pill-dim", 100)}
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">Measures (${measures.length})</div>
                    ${renderPills(measures, "pill-measure", 100)}
                </div>
            `;

            modal.classList.add("active");
        }

        function closeDetailModal() {
            document.getElementById("detailModal").classList.remove("active");
        }

        function renderUI() {
            const container = document.getElementById("mainContainer");
            const groupKeys = Object.keys(reportGroups);

            if (groupKeys.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="4" width="18" height="16" rx="2"/>
                            <path d="M9 9h6M9 13h6"/>
                        </svg>
                        <h3>Reports Inventory</h3>
                        <p>No report details found.</p>
                    </div>
                `;
                return;
            }

            let html = "";
            let totalRenderedGroups = 0;
            reportsById = {};

            for (const key of groupKeys) {
                const reports = reportGroups[key] || [];

                const filtered = reports.filter(r => {
                    const name = cleanHex(r.name || r.Name || r["Report Name"] || "").toLowerCase();
                    const id = String(r.id || r.ID || r["Report ID"] || "").toLowerCase();
                    return name.includes(activeSearch) || id.includes(activeSearch);
                });

                if (filtered.length === 0) continue;
                totalRenderedGroups++;

                filtered.forEach(r => {
                    const rid = r.id || r.ID || r["Report ID"];
                    if (rid) reportsById[rid] = r;
                });

                const safeKeyId = key.replace(/\s+/g, "-");
                const isExpanded = activeSearch !== "" ? "expanded" : "";

                html += `
                    <div class="accordion-item ${isExpanded}" id="group-${safeKeyId}">
                        <button class="accordion-header" onclick="toggleGroup('${safeKeyId}')">
                            <span class="accordion-title">
                                ${esc(key)}
                                <span class="count-badge">${filtered.length}</span>
                            </span>
                            <span class="chevron">\u25BC</span>
                        </button>
                        <div class="accordion-content">
                            <div class="table-scroll-wrapper">
                                <table class="report-table">
                                    <thead>
                                        <tr>
                                            <th>Report Name</th>
                                            <th>Report ID</th>
                                            <th>Dimensions</th>
                                            <th>Measures</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${filtered.map(r => {
                                            const rName = cleanHex(r.name || r.Name || r["Report Name"] || "Unnamed Report");
                                            const rId = r.id || r.ID || r["Report ID"] || "\u2014";
                                            const dims = r.dimensions || r.Dimensions || [];
                                            const measures = r.measures || r.Measures || [];

                                            return `
                                                <tr class="report-row">
                                                    <td class="report-name-cell">${esc(rName)}</td>
                                                    <td class="report-id-cell">${esc(rId)}</td>
                                                    <td>${renderPills(dims, "pill-dim", 3)}</td>
                                                    <td>${renderPills(measures, "pill-measure", 3)}</td>
                                                    <td>
                                                        <button class="btn-view-details" onclick="openDetailModal('${esc(rId)}')">🔍 Details</button>
                                                    </td>
                                                </tr>
                                            `;
                                        }).join("")}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (totalRenderedGroups === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No reports found</h3>
                        <p>${activeSearch ? 'No reports match your search query.' : 'There are no reports loaded in the environment yet.'}</p>
                    </div>
                `;
            } else {
                container.innerHTML = html;
            }
        }

        function esc(str) {
            const div = document.createElement("div");
            div.textContent = (str === undefined || str === null) ? "" : str;
            return div.innerHTML;
        }

        init();
    </script>
</body>

</html>
